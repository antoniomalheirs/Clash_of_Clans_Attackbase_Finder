name: Build & Release APK

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Remove duplicate webp icons (keep png only)
        run: |
          find app/src/main/res/mipmap-* -name "*.webp" -delete 2>/dev/null || true
          find app/src/main/res/mipmap-anydpi* -name "*.xml" -delete 2>/dev/null || true

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Generate version tag
        id: version
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          DATE=$(date +'%Y.%m.%d')
          VERSION="v${DATE}-${SHORT_SHA}"
          echo "tag=${VERSION}" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/ClashFinder-${{ steps.version.outputs.tag }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "⚔️ Clash Finder ${{ steps.version.outputs.tag }}"
          body: |
            ### 📦 Build automático

            **Commit:** `${{ github.event.head_commit.message }}`
            **SHA:** `${{ github.sha }}`

            ---
            📥 Baixe o APK abaixo e instale no seu dispositivo Android.
          files: app/build/outputs/apk/debug/ClashFinder-${{ steps.version.outputs.tag }}.apk
          generate_release_notes: true
